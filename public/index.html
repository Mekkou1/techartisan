<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <title>TechArtisan - Services Informatiques & Développement Web</title>
    <meta name="description" content="TechArtisan : Expertise en comptabilité-gestion, design & branding, maintenance informatique et développement web/mobile. Solutions sur mesure pour TPE/PME.">
    <meta name="keywords" content="développement web, application mobile, comptabilité, design, branding, maintenance informatique, TechArtisan">
    <meta name="author" content="TechArtisan">
    <meta name="google-site-verification" content="qHuFSln5pG5vJ8wwDrUCpFPm2fRYr5hyPiQ4rSnMtn4" />


    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.techartisanci.online/">
    <meta property="og:title" content="TechArtisan - Services Informatiques & Développement Web">
    <meta property="og:description" content="Expertise en comptabilité-gestion, design & branding, maintenance informatique et développement web/mobile.">
    <meta property="og:image" content="<%= BASE_URL %>logo-tech.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://www.techartisanci.online/">
    <meta property="twitter:title" content="TechArtisan - Services Informatiques & Développement Web">
    <meta property="twitter:description" content="Expertise en comptabilité-gestion, design & branding, maintenance informatique et développement web/mobile.">
    <meta property="twitter:image" content="<%= BASE_URL %>logo-tech.png">

    <!-- Favicon -->
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <link rel="apple-touch-icon" href="<%= BASE_URL %>logo-tech.png">

    <!-- Theme Color -->
    <meta name="theme-color" content="#1351e0">
    <meta name="msapplication-TileColor" content="#1351e0">

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "TechArtisan",
      "url": "https://www.techartisanci.online/",
      "logo": "https://www.techartisanci.online/logo-tech.png",
      "description": "Expertise en comptabilité-gestion, design & branding, maintenance informatique et développement web/mobile.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "CI",
        "addressLocality": "Abidjan"
      },
      "serviceType": [
        "Développement Web",
        "Développement Mobile",
        "Maintenance Informatique",
        "Design & Branding",
        "Comptabilité & Gestion"
      ]
    }
    </script>
  </head>

  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
